<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adoption — Find an AI Champion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --color-bg: #0E0D0C;
            --color-text: #F0EBE3;
            --color-muted: #7A7068;
            --color-accent: #C8744A;
            --color-green: #27AE60;
            --color-dull: #2A2724;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 8fr 4fr;
        }

        /* ── LEFT CONTENT ── */
        .content {
            padding: 64px 72px 64px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .accent-rule {
            width: 0;
            height: 1px;
            background: var(--color-accent);
            margin-bottom: 18px;
            animation: ruleGrow 600ms cubic-bezier(0.16, 1, 0.3, 1) 200ms forwards;
        }

        @keyframes ruleGrow {
            to {
                width: 120px;
            }
        }

        .eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-green);
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeUp 500ms ease-out 400ms forwards;
        }

        .headline {
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(30px, 3.6vw, 48px);
            font-weight: 300;
            line-height: 1.1;
            letter-spacing: -0.025em;
            color: var(--color-text);
            margin-bottom: 52px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 600ms cubic-bezier(0.16, 1, 0.3, 1) 550ms forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── FIGURE GRID ── */
        .figure-grid {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 110px);
            column-gap: 48px;
            row-gap: 16px;
            opacity: 0;
            animation: fadeUp 500ms ease-out 800ms forwards;
        }

        /* ── FIGURE CELL ── */
        .figure-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            position: relative;
        }

        /* ── FIGURE SVG ── */
        .figure-svg {
            display: block;
            flex-shrink: 0;
            transition: filter 400ms ease-out;
        }

        /* dull state */
        .fig-stroke {
            stroke: var(--color-dull);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            transition: stroke 400ms ease-out, opacity 400ms ease-out;
        }

        .fig-head {
            fill: none;
            stroke: var(--color-dull);
            stroke-width: 2;
            transition: stroke 400ms ease-out, fill 400ms ease-out;
        }

        .figure-cell.dull .figure-svg {
            opacity: 0.38;
        }

        /* champion state */
        .figure-cell.champion .figure-svg {
            opacity: 1;
            filter: drop-shadow(0 0 10px #C8744A55);
        }

        .figure-cell.champion .fig-stroke {
            stroke: var(--color-text);
        }

        .figure-cell.champion .fig-head {
            stroke: var(--color-text);
        }

        /* ── CROWN ── */
        .crown-wrap {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) scale(0);
            transform-origin: bottom center;
            transition: transform 350ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .crown-wrap.visible {
            transform: translateX(-50%) scale(1);
        }

        /* ── CHAMPION LABEL ── */
        .champion-label {
            font-family: 'DM Mono', monospace;
            font-size: 9.5px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--color-accent);
            opacity: 0;
            transition: opacity 300ms ease-out;
            white-space: nowrap;
            text-align: center;
        }

        .champion-label.visible {
            opacity: 1;
        }

        /* ── RIGHT (empty) ── */
        .video-region {
            /* intentionally empty */
        }
    </style>
</head>

<body>

    <div class="slide">
        <div class="content">

            <div class="accent-rule"></div>
            <div class="eyebrow">03 — Adoption</div>
            <h1 class="headline">Find an AI Champion.</h1>

            <!-- 3×3 grid of stick figures -->
            <div class="figure-grid" id="figure-grid">

                <!-- Row 0 -->
                <div class="figure-cell dull" id="fig-0">
                    <div class="crown-wrap" id="crown-0"></div>
                    <svg class="figure-svg" width="40" height="72" viewBox="0 0 40 72">
                        <circle class="fig-head" cx="20" cy="11" r="10" />
                        <line class="fig-stroke" x1="20" y1="21" x2="20" y2="44" />
                        <line class="fig-stroke" x1="20" y1="28" x2="6" y2="38" />
                        <line class="fig-stroke" x1="20" y1="28" x2="34" y2="38" />
                        <line class="fig-stroke" x1="20" y1="44" x2="8" y2="62" />
                        <line class="fig-stroke" x1="20" y1="44" x2="32" y2="62" />
                    </svg>
                    <div class="champion-label" id="label-0"></div>
                </div>

                <div class="figure-cell dull" id="fig-1">
                    <div class="crown-wrap" id="crown-1"></div>
                    <svg class="figure-svg" width="40" height="72" viewBox="0 0 40 72">
                        <circle class="fig-head" cx="20" cy="11" r="10" />
                        <line class="fig-stroke" x1="20" y1="21" x2="20" y2="44" />
                        <line class="fig-stroke" x1="20" y1="28" x2="6" y2="38" />
                        <line class="fig-stroke" x1="20" y1="28" x2="34" y2="38" />
                        <line class="fig-stroke" x1="20" y1="44" x2="8" y2="62" />
                        <line class="fig-stroke" x1="20" y1="44" x2="32" y2="62" />
                    </svg>
                    <div class="champion-label" id="label-1"></div>
                </div>

                <div class="figure-cell dull" id="fig-2">
                    <div class="crown-wrap" id="crown-2"></div>
                    <svg class="figure-svg" width="40" height="72" viewBox="0 0 40 72">
                        <circle class="fig-head" cx="20" cy="11" r="10" />
                        <line class="fig-stroke" x1="20" y1="21" x2="20" y2="44" />
                        <line class="fig-stroke" x1="20" y1="28" x2="6" y2="38" />
                        <line class="fig-stroke" x1="20" y1="28" x2="34" y2="38" />
                        <line class="fig-stroke" x1="20" y1="44" x2="8" y2="62" />
                        <line class="fig-stroke" x1="20" y1="44" x2="32" y2="62" />
                    </svg>
                    <div class="champion-label" id="label-2"></div>
                </div>

                <!-- Row 1 -->
                <div class="figure-cell dull" id="fig-3">
                    <div class="crown-wrap" id="crown-3"></div>
                    <svg class="figure-svg" width="40" height="72" viewBox="0 0 40 72">
                        <circle class="fig-head" cx="20" cy="11" r="10" />
                        <line class="fig-stroke" x1="20" y1="21" x2="20" y2="44" />
                        <line class="fig-stroke" x1="20" y1="28" x2="6" y2="38" />
                        <line class="fig-stroke" x1="20" y1="28" x2="34" y2="38" />
                        <line class="fig-stroke" x1="20" y1="44" x2="8" y2="62" />
                        <line class="fig-stroke" x1="20" y1="44" x2="32" y2="62" />
                    </svg>
                    <div class="champion-label" id="label-3"></div>
                </div>

                <!-- CENTER / CHAMPION -->
                <div class="figure-cell dull" id="fig-4">
                    <div class="crown-wrap" id="crown-4">
                        <!-- Crown SVG -->
                        <svg width="36" height="22" viewBox="0 0 36 22" xmlns="http://www.w3.org/2000/svg">
                            <polygon points="2,20 2,8 10,14 18,2 26,14 34,8 34,20" fill="#C8744A" stroke="#C8744A"
                                stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" />
                            <line x1="2" y1="20" x2="34" y2="20" stroke="#C8744A" stroke-width="2.5"
                                stroke-linecap="round" />
                        </svg>
                    </div>
                    <svg class="figure-svg" width="40" height="72" viewBox="0 0 40 72">
                        <circle class="fig-head" cx="20" cy="11" r="10" />
                        <line class="fig-stroke" x1="20" y1="21" x2="20" y2="44" />
                        <line class="fig-stroke" x1="20" y1="28" x2="6" y2="38" />
                        <line class="fig-stroke" x1="20" y1="28" x2="34" y2="38" />
                        <line class="fig-stroke" x1="20" y1="44" x2="8" y2="62" />
                        <line class="fig-stroke" x1="20" y1="44" x2="32" y2="62" />
                    </svg>
                    <div class="champion-label" id="label-4">AI Champion</div>
                </div>

                <div class="figure-cell dull" id="fig-5">
                    <div class="crown-wrap" id="crown-5"></div>
                    <svg class="figure-svg" width="40" height="72" viewBox="0 0 40 72">
                        <circle class="fig-head" cx="20" cy="11" r="10" />
                        <line class="fig-stroke" x1="20" y1="21" x2="20" y2="44" />
                        <line class="fig-stroke" x1="20" y1="28" x2="6" y2="38" />
                        <line class="fig-stroke" x1="20" y1="28" x2="34" y2="38" />
                        <line class="fig-stroke" x1="20" y1="44" x2="8" y2="62" />
                        <line class="fig-stroke" x1="20" y1="44" x2="32" y2="62" />
                    </svg>
                    <div class="champion-label" id="label-5"></div>
                </div>

                <!-- Row 2 -->
                <div class="figure-cell dull" id="fig-6">
                    <div class="crown-wrap" id="crown-6"></div>
                    <svg class="figure-svg" width="40" height="72" viewBox="0 0 40 72">
                        <circle class="fig-head" cx="20" cy="11" r="10" />
                        <line class="fig-stroke" x1="20" y1="21" x2="20" y2="44" />
                        <line class="fig-stroke" x1="20" y1="28" x2="6" y2="38" />
                        <line class="fig-stroke" x1="20" y1="28" x2="34" y2="38" />
                        <line class="fig-stroke" x1="20" y1="44" x2="8" y2="62" />
                        <line class="fig-stroke" x1="20" y1="44" x2="32" y2="62" />
                    </svg>
                    <div class="champion-label" id="label-6"></div>
                </div>

                <div class="figure-cell dull" id="fig-7">
                    <div class="crown-wrap" id="crown-7"></div>
                    <svg class="figure-svg" width="40" height="72" viewBox="0 0 40 72">
                        <circle class="fig-head" cx="20" cy="11" r="10" />
                        <line class="fig-stroke" x1="20" y1="21" x2="20" y2="44" />
                        <line class="fig-stroke" x1="20" y1="28" x2="6" y2="38" />
                        <line class="fig-stroke" x1="20" y1="28" x2="34" y2="38" />
                        <line class="fig-stroke" x1="20" y1="44" x2="8" y2="62" />
                        <line class="fig-stroke" x1="20" y1="44" x2="32" y2="62" />
                    </svg>
                    <div class="champion-label" id="label-7"></div>
                </div>

                <div class="figure-cell dull" id="fig-8">
                    <div class="crown-wrap" id="crown-8"></div>
                    <svg class="figure-svg" width="40" height="72" viewBox="0 0 40 72">
                        <circle class="fig-head" cx="20" cy="11" r="10" />
                        <line class="fig-stroke" x1="20" y1="21" x2="20" y2="44" />
                        <line class="fig-stroke" x1="20" y1="28" x2="6" y2="38" />
                        <line class="fig-stroke" x1="20" y1="28" x2="34" y2="38" />
                        <line class="fig-stroke" x1="20" y1="44" x2="8" y2="62" />
                        <line class="fig-stroke" x1="20" y1="44" x2="32" y2="62" />
                    </svg>
                    <div class="champion-label" id="label-8"></div>
                </div>

            </div>

        </div>

        <div class="video-region"></div>
    </div>

    <script>
        let triggered = false;

        document.addEventListener('keydown', (e) => {
            if (e.code !== 'Space' || triggered) return;
            e.preventDefault();
            triggered = true;

            const cell = document.getElementById('fig-4');

            // 1. Brighten the champion figure
            cell.classList.remove('dull');
            cell.classList.add('champion');

            // 2. Show crown after a beat
            setTimeout(() => {
                document.getElementById('crown-4').classList.add('visible');
            }, 150);

            // 3. Show label after crown
            setTimeout(() => {
                document.getElementById('label-4').classList.add('visible');
            }, 420);
        });
    </script>
</body>

</html>
