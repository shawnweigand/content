<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Implementation — Assistant vs Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --color-bg: #0E0D0C;
            --color-surface: #161513;
            --color-border: #2A2724;
            --color-text: #F0EBE3;
            --color-muted: #7A7068;
            --color-accent: #C8744A;
            --color-blue: #2980B9;
            --color-red: #C0392B;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 8fr 4fr;
        }

        /* ── LEFT CONTENT ── */
        .content {
            padding: 64px 72px 64px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .accent-rule {
            width: 0;
            height: 1px;
            background: var(--color-accent);
            margin-bottom: 20px;
            animation: ruleGrow 600ms cubic-bezier(0.16, 1, 0.3, 1) 200ms forwards;
        }

        @keyframes ruleGrow {
            to {
                width: 120px;
            }
        }

        .eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-blue);
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeUp 500ms ease-out 400ms forwards;
        }

        .headline {
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(26px, 3vw, 40px);
            font-weight: 300;
            line-height: 1.15;
            letter-spacing: -0.02em;
            color: var(--color-text);
            margin-bottom: 32px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 600ms cubic-bezier(0.16, 1, 0.3, 1) 550ms forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── MODE LABEL ── */
        .mode-label-wrap {
            position: relative;
            height: 58px;
            margin-bottom: 40px;
        }

        .mode-label {
            position: absolute;
            top: 0;
            left: 0;
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(36px, 4.5vw, 56px);
            font-weight: 300;
            line-height: 1.0;
            letter-spacing: -0.025em;
            transition: opacity 400ms ease-out, color 400ms ease-out;
        }

        #label-assistant {
            color: var(--color-text);
            opacity: 0;
        }

        #label-agent {
            color: var(--color-blue);
            opacity: 0;
        }

        /* ── DIAGRAM WRAP ── */
        .diagram-wrap {
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 400ms ease-out, transform 400ms ease-out;
        }

        .diagram-wrap.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── SVG ── */
        .diagram-svg {
            width: 100%;
            display: block;
            overflow: visible;
        }

        /* ── ACTOR TRANSITIONS ── */
        #actor-human {
            transition: opacity 350ms ease-out;
        }

        #actor-robot {
            transition: opacity 350ms ease-out;
            opacity: 0;
        }

        #chat-bubble {
            transition: opacity 350ms ease-out;
        }

        /* ── RIGHT (empty) ── */
        .video-region {
            /* intentionally empty */
        }
    </style>
</head>

<body>

    <div class="slide">
        <div class="content">

            <div class="accent-rule"></div>
            <div class="eyebrow">02 — Implementation</div>
            <h1 class="headline">How solutions get run.</h1>

            <!-- Mode label: crossfades between Assistant / Agent -->
            <div class="mode-label-wrap">
                <div class="mode-label" id="label-assistant">Assistant</div>
                <div class="mode-label" id="label-agent">Agent</div>
            </div>

            <!-- Diagram -->
            <div class="diagram-wrap" id="diagram-wrap">
                <!--
        SVG layout (viewBox 560 × 160):
        Human/Robot actor:   cx=60,  cy=70
        Chat bubble:         x=100,  y=44  (w=64, h=36)
        Dotted arrow:        x1=175, y1=80  x2=340, y2=80
        Gears node:          x=348,  y=40  (w=88, h=76)
        Labels:              below each element
      -->
                <svg class="diagram-svg" viewBox="0 0 560 180" xmlns="http://www.w3.org/2000/svg">

                    <!-- ════════════════════════════ -->
                    <!-- HUMAN STICK FIGURE          -->
                    <!-- ════════════════════════════ -->
                    <g id="actor-human">
                        <!-- head -->
                        <circle cx="60" cy="44" r="12" fill="none" stroke="#F0EBE3" stroke-width="2" />
                        <!-- body -->
                        <line x1="60" y1="56" x2="60" y2="84" stroke="#F0EBE3" stroke-width="2" />
                        <!-- left arm -->
                        <line x1="60" y1="66" x2="42" y2="76" stroke="#F0EBE3" stroke-width="2" />
                        <!-- right arm -->
                        <line x1="60" y1="66" x2="78" y2="76" stroke="#F0EBE3" stroke-width="2" />
                        <!-- left leg -->
                        <line x1="60" y1="84" x2="44" y2="104" stroke="#F0EBE3" stroke-width="2" />
                        <!-- right leg -->
                        <line x1="60" y1="84" x2="76" y2="104" stroke="#F0EBE3" stroke-width="2" />
                    </g>

                    <!-- ════════════════════════════ -->
                    <!-- ROBOT (hidden until press 2) -->
                    <!-- ════════════════════════════ -->
                    <g id="actor-robot">
                        <!-- antenna -->
                        <line x1="60" y1="22" x2="60" y2="30" stroke="#2980B9" stroke-width="2"
                            stroke-linecap="round" />
                        <circle cx="60" cy="20" r="3" fill="#2980B9" />
                        <!-- head -->
                        <rect x="42" y="30" width="36" height="28" rx="5" fill="#0D1A2A" stroke="#2980B9"
                            stroke-width="2" />
                        <!-- eyes -->
                        <circle cx="52" cy="44" r="3.5" fill="#2980B9" />
                        <circle cx="68" cy="44" r="3.5" fill="#2980B9" />
                        <!-- body -->
                        <rect x="46" y="60" width="28" height="22" rx="4" fill="#0D1A2A" stroke="#2980B9"
                            stroke-width="1.8" />
                        <!-- AI label -->
                        <text x="60" y="100" text-anchor="middle" font-family="'DM Mono', monospace" font-size="10"
                            font-weight="500" letter-spacing="0.06em" fill="#2980B9">AI</text>
                    </g>

                    <!-- ════════════════════════════ -->
                    <!-- CHAT BUBBLE                 -->
                    <!-- ════════════════════════════ -->
                    <g id="chat-bubble">
                        <!-- bubble body -->
                        <rect x="100" y="42" width="68" height="38" rx="8" fill="#1E1C1A" stroke="#C8744A"
                            stroke-width="1.5" />
                        <!-- tail pointing left -->
                        <polygon points="106,72 96,80 114,78" fill="#1E1C1A" stroke="#C8744A" stroke-width="1.5"
                            stroke-linejoin="round" />
                        <!-- AI text -->
                        <text x="134" y="66" text-anchor="middle" font-family="'DM Mono', monospace" font-size="13"
                            font-weight="500" letter-spacing="0.06em" fill="#C8744A">AI</text>
                    </g>

                    <!-- ════════════════════════════ -->
                    <!-- DOTTED ARROW                -->
                    <!-- ════════════════════════════ -->
                    <g id="arrow-group">
                        <line x1="180" y1="80" x2="344" y2="80" stroke="#2A2724" stroke-width="1.5"
                            stroke-dasharray="5 5" stroke-linecap="round" />
                        <polygon points="342,74 356,80 342,86" fill="#2A2724" />
                    </g>

                    <!-- ════════════════════════════ -->
                    <!-- GEARS NODE                  -->
                    <!-- ════════════════════════════ -->
                    <g id="gears-group">
                        <!-- node container -->
                        <rect x="360" y="40" width="88" height="76" rx="8" fill="#1E1C1A" stroke="#2A2724"
                            stroke-width="1.5" />

                        <!-- Gear 1 (left, larger) centered ~390,78 r14 -->
                        <circle cx="390" cy="78" r="7" fill="none" stroke="#C8744A" stroke-width="1.8" />
                        <circle cx="390" cy="78" r="2.5" fill="#C8744A" />
                        <!-- gear teeth: 8 short lines radiating out -->
                        <line x1="390" y1="67" x2="390" y2="64" stroke="#C8744A" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="390" y1="89" x2="390" y2="92" stroke="#C8744A" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="379" y1="78" x2="376" y2="78" stroke="#C8744A" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="401" y1="78" x2="404" y2="78" stroke="#C8744A" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="382" y1="70" x2="380" y2="68" stroke="#C8744A" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="398" y1="86" x2="400" y2="88" stroke="#C8744A" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="398" y1="70" x2="400" y2="68" stroke="#C8744A" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="382" y1="86" x2="380" y2="88" stroke="#C8744A" stroke-width="2"
                            stroke-linecap="round" />

                        <!-- Gear 2 (right, smaller) centered ~412,62 r9 -->
                        <circle cx="412" cy="60" r="5" fill="none" stroke="#C8744A" stroke-width="1.5" />
                        <circle cx="412" cy="60" r="1.8" fill="#C8744A" />
                        <line x1="412" y1="53" x2="412" y2="51" stroke="#C8744A" stroke-width="1.5"
                            stroke-linecap="round" />
                        <line x1="412" y1="67" x2="412" y2="69" stroke="#C8744A" stroke-width="1.5"
                            stroke-linecap="round" />
                        <line x1="405" y1="60" x2="403" y2="60" stroke="#C8744A" stroke-width="1.5"
                            stroke-linecap="round" />
                        <line x1="419" y1="60" x2="421" y2="60" stroke="#C8744A" stroke-width="1.5"
                            stroke-linecap="round" />
                        <line x1="407" y1="55" x2="405" y2="53" stroke="#C8744A" stroke-width="1.5"
                            stroke-linecap="round" />
                        <line x1="417" y1="65" x2="419" y2="67" stroke="#C8744A" stroke-width="1.5"
                            stroke-linecap="round" />

                        <!-- label below gears node -->
                        <text x="404" y="132" text-anchor="middle" font-family="'DM Mono', monospace" font-size="9.5"
                            font-weight="500" letter-spacing="0.06em" text-transform="uppercase"
                            fill="#7A7068">Automated Workflow</text>
                    </g>

                    <!-- ════════════════════════════ -->
                    <!-- BOTTOM LABELS               -->
                    <!-- ════════════════════════════ -->
                    <!-- Human label -->
                    <text id="actor-label-human" x="60" y="120" text-anchor="middle" font-family="'DM Mono', monospace"
                        font-size="9.5" font-weight="500" letter-spacing="0.06em" fill="#7A7068">You</text>

                    <!-- Robot label is embedded inside robot group above -->

                </svg>
            </div>

        </div>

        <div class="video-region"></div>
    </div>

    <script>
        let step = 0;

        document.addEventListener('keydown', (e) => {
            if (e.code !== 'Space') return;
            e.preventDefault();
            step++;

            if (step === 1) {
                // Reveal title and diagram
                document.getElementById('label-assistant').style.opacity = '1';
                document.getElementById('diagram-wrap').classList.add('visible');

            } else if (step === 2) {
                // Crossfade mode label
                document.getElementById('label-assistant').style.opacity = '0';
                document.getElementById('label-agent').style.opacity = '1';

                // Swap actor: human out, robot in
                document.getElementById('actor-human').style.opacity = '0';
                document.getElementById('actor-label-human').style.opacity = '0';
                document.getElementById('actor-robot').style.opacity = '1';

                // Hide chat bubble
                document.getElementById('chat-bubble').style.opacity = '0';
            }
        });
    </script>
</body>

</html>
