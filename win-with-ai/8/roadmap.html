<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discovery — Solution Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --color-bg: #0E0D0C;
            --color-surface: #161513;
            --color-border: #2A2724;
            --color-text: #F0EBE3;
            --color-muted: #7A7068;
            --color-accent: #C8744A;
            --color-red: #C0392B;
            --color-green: #27AE60;
            --color-green-fill: #0D1F12;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 8fr 4fr;
            position: relative;
        }

        .slide::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 50% 55% at 28% 50%, #C0392B04 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── LEFT CONTENT ── */
        .content {
            padding: 64px 72px 64px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .accent-rule {
            width: 0;
            height: 1px;
            background: var(--color-accent);
            margin-bottom: 20px;
            animation: ruleGrow 600ms cubic-bezier(0.16, 1, 0.3, 1) 200ms forwards;
        }

        @keyframes ruleGrow {
            to {
                width: 120px;
            }
        }

        .eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-red);
            margin-bottom: 14px;
            opacity: 0;
            animation: fadeUp 500ms ease-out 400ms forwards;
        }

        .headline {
            font-family: 'Fraunces', Georgia, serif;
            font-size: clamp(28px, 3.2vw, 42px);
            font-weight: 300;
            line-height: 1.15;
            letter-spacing: -0.02em;
            color: var(--color-text);
            margin-bottom: 56px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 600ms cubic-bezier(0.16, 1, 0.3, 1) 550ms forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── ROADMAP WRAP ── */
        .roadmap-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
            opacity: 0;
            animation: fadeUp 400ms ease-out 800ms forwards;
        }

        /* ── NODE ROW ── */
        .node-row {
            display: flex;
            align-items: center;
            gap: 0;
            width: 100%;
        }

        /* ── NODE WRAPPER ── */
        .node-wrap {
            position: relative;
            flex-shrink: 0;
        }

        /* ── NODE BOX ── */
        .node {
            width: 72px;
            height: 46px;
            border-radius: 8px;
            border: 1.5px solid var(--color-border);
            background: var(--color-surface);
            position: relative;
            transition: background 250ms ease-out, border-color 250ms ease-out;
        }

        .node.checked {
            background: var(--color-green-fill);
            border-color: var(--color-green);
            border-width: 2px;
        }

        /* ── CHECKMARK SVG overlay ── */
        .checkmark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .check-path {
            stroke: var(--color-green);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            transition: stroke-dashoffset 300ms ease-out;
        }

        .check-path.drawn {
            stroke-dashoffset: 0;
        }

        /* ── CONNECTOR ── */
        .connector {
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 20px;
        }

        .connector svg {
            width: 100%;
            display: block;
            overflow: visible;
        }

        /* ── FINALE LABEL ── */
        .finale-label {
            font-family: 'Fraunces', Georgia, serif;
            font-style: italic;
            font-weight: 300;
            font-size: 20px;
            color: var(--color-text);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 400ms ease-out, transform 400ms ease-out;
        }

        .finale-label.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── RIGHT (empty) ── */
        .video-region {
            /* intentionally empty */
        }
    </style>
</head>

<body>

    <div class="slide">
        <div class="content">

            <div class="accent-rule"></div>
            <div class="eyebrow">01 — Discovery</div>

            <h1 class="headline">
                Here's what we're<br>going to build.
            </h1>

            <div class="roadmap-wrap">

                <!-- Node row -->
                <div class="node-row">

                    <!-- Node 1 -->
                    <div class="node-wrap">
                        <div class="node" id="node-0">
                            <svg class="checkmark" width="22" height="18" viewBox="0 0 22 18">
                                <path class="check-path" id="check-0" d="M2,9 L8,15 L20,2" />
                            </svg>
                        </div>
                    </div>

                    <!-- Connector 1→2 -->
                    <div class="connector">
                        <svg height="12" viewBox="0 0 100 12" preserveAspectRatio="none">
                            <line x1="0" y1="6" x2="88" y2="6" stroke="#2A2724" stroke-width="1.5" />
                            <polygon points="88,2 100,6 88,10" fill="#2A2724" />
                        </svg>
                    </div>

                    <!-- Node 2 -->
                    <div class="node-wrap">
                        <div class="node" id="node-1">
                            <svg class="checkmark" width="22" height="18" viewBox="0 0 22 18">
                                <path class="check-path" id="check-1" d="M2,9 L8,15 L20,2" />
                            </svg>
                        </div>
                    </div>

                    <!-- Connector 2→3 -->
                    <div class="connector">
                        <svg height="12" viewBox="0 0 100 12" preserveAspectRatio="none">
                            <line x1="0" y1="6" x2="88" y2="6" stroke="#2A2724" stroke-width="1.5" />
                            <polygon points="88,2 100,6 88,10" fill="#2A2724" />
                        </svg>
                    </div>

                    <!-- Node 3 -->
                    <div class="node-wrap">
                        <div class="node" id="node-2">
                            <svg class="checkmark" width="22" height="18" viewBox="0 0 22 18">
                                <path class="check-path" id="check-2" d="M2,9 L8,15 L20,2" />
                            </svg>
                        </div>
                    </div>

                    <!-- Connector 3→4 -->
                    <div class="connector">
                        <svg height="12" viewBox="0 0 100 12" preserveAspectRatio="none">
                            <line x1="0" y1="6" x2="88" y2="6" stroke="#2A2724" stroke-width="1.5" />
                            <polygon points="88,2 100,6 88,10" fill="#2A2724" />
                        </svg>
                    </div>

                    <!-- Node 4 -->
                    <div class="node-wrap">
                        <div class="node" id="node-3">
                            <svg class="checkmark" width="22" height="18" viewBox="0 0 22 18">
                                <path class="check-path" id="check-3" d="M2,9 L8,15 L20,2" />
                            </svg>
                        </div>
                    </div>

                    <!-- Connector 4→5 -->
                    <div class="connector">
                        <svg height="12" viewBox="0 0 100 12" preserveAspectRatio="none">
                            <line x1="0" y1="6" x2="88" y2="6" stroke="#2A2724" stroke-width="1.5" />
                            <polygon points="88,2 100,6 88,10" fill="#2A2724" />
                        </svg>
                    </div>

                    <!-- Node 5 -->
                    <div class="node-wrap">
                        <div class="node" id="node-4">
                            <svg class="checkmark" width="22" height="18" viewBox="0 0 22 18">
                                <path class="check-path" id="check-4" d="M2,9 L8,15 L20,2" />
                            </svg>
                        </div>
                    </div>

                    <!-- Connector 5→6 -->
                    <div class="connector">
                        <svg height="12" viewBox="0 0 100 12" preserveAspectRatio="none">
                            <line x1="0" y1="6" x2="88" y2="6" stroke="#2A2724" stroke-width="1.5" />
                            <polygon points="88,2 100,6 88,10" fill="#2A2724" />
                        </svg>
                    </div>

                    <!-- Node 6 -->
                    <div class="node-wrap">
                        <div class="node" id="node-5">
                            <svg class="checkmark" width="22" height="18" viewBox="0 0 22 18">
                                <path class="check-path" id="check-5" d="M2,9 L8,15 L20,2" />
                            </svg>
                        </div>
                    </div>

                </div>
                <!-- end node-row -->

                <!-- Finale label -->
                <div class="finale-label" id="finale-label">Your AI roadmap.</div>

            </div>

        </div>

        <div class="video-region"></div>
    </div>

    <script>
        const TOTAL = 6;
        let step = 0;

        function checkNode(i) {
            document.getElementById(`node-${i}`).classList.add('checked');
            // slight delay so border transitions first
            setTimeout(() => {
                document.getElementById(`check-${i}`).classList.add('drawn');
            }, 60);
        }

        let isRunning = false;
        function startSequence() {
            if (isRunning) return;
            isRunning = true;

            const interval = 450; 

            const run = () => {
                if (step >= TOTAL) {
                    setTimeout(() => {
                        document.getElementById('finale-label').classList.add('visible');
                    }, 380);
                    return;
                }
                checkNode(step);
                step++;
                setTimeout(run, interval);
            };

            run();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code !== 'Space') return;
            e.preventDefault();
            startSequence();
        });
    </script>
</body>

</html>
